{% extends "base.html" %}
{% block title %}{{ action }} Company — Job Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-dark text-white fw-semibold">
        <i class="bi bi-building me-2"></i>{{ action }} Company
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Company Name</label>
            <input type="text" name="company_name" class="form-control"
                   value="{{ company.company_name if company else '' }}"
                   placeholder="e.g. BHP" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Sector / Note</label>
            <input type="text" name="note" class="form-control"
                   value="{{ company.note if company else '' }}"
                   placeholder="e.g. Mining, Consultant, Aerospace">
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Industry Tags (comma-separated)</label>
            <input type="text" name="industry" id="industry" class="form-control"
                    value="{{ company.industry if company and company.industry else '' }}"
                    placeholder="e.g. Mining, Engineering, Finance, Energy">
            <div id="industrySuggestions" class="mt-2 d-flex flex-wrap gap-1"></div>
            <div class="form-text">Optional. Add one or more industries/tags separated by commas.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold d-block">Applied Years</label>
            <div class="d-flex gap-3 flex-wrap">
              {% for y in years %}
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox"
                       name="applied_{{ y }}" id="applied_{{ y }}" value="1"
                       {% if company and company['applied_' + y|string] %}checked{% endif %}>
                <label class="form-check-label" for="applied_{{ y }}">{{ y }}</label>
              </div>
              {% endfor %}
            </div>
          </div>

          <hr>
          <div class="d-flex gap-2 justify-content-end">
            <a href="{{ url_for('companies.companies') }}" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left me-1"></i>Cancel
            </a>
            <button type="submit" class="btn btn-warning fw-semibold">
              <i class="bi bi-save me-1"></i>{{ action }} Company
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  const input = document.getElementById('industry');
  const box = document.getElementById('industrySuggestions');
  const allTags = {{ (industry_tags or []) | tojson }};
  if (!input || !box || !allTags.length) return;

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function currentToken(value) {
    const parts = value.split(',');
    return (parts[parts.length - 1] || '').trim().toLowerCase();
  }
  function replaceLastToken(value, tag) {
    const parts = value.split(',');
    parts[parts.length - 1] = ' ' + tag;
    return parts.join(',').replace(/^ /, '') + ', ';
  }
  function renderSuggestions() {
    const token = currentToken(input.value);
    if (!token) {
      box.innerHTML = '';
      return;
    }
    const matches = allTags.filter(t => t.toLowerCase().startsWith(token)).slice(0, 8);
    box.innerHTML = matches.map(t => (
      '<button type="button" class="btn btn-outline-info btn-sm py-0 px-2 tag-suggestion" data-tag="' + esc(t) + '">' + esc(t) + '</button>'
    )).join('');
    box.querySelectorAll('.tag-suggestion').forEach(btn => {
      btn.addEventListener('click', function () {
        input.value = replaceLastToken(input.value, this.dataset.tag);
        input.focus();
        renderSuggestions();
      });
    });
  }

  input.addEventListener('input', renderSuggestions);
})();
</script>
{% endblock %}
