services:
  app:
    # build: . builds from local source. Remove or comment it out and run
    # "docker compose pull && docker compose up -d" to pull a pre-built image
    # from the GitHub Container Registry instead (e.g. when updating).
    build: .
    image: ghcr.io/midnightmight/job_application_tracker:latest
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    environment:
      # REQUIRED: set a strong, unique secret key before deploying
      - SECRET_KEY=${SECRET_KEY:?Set the SECRET_KEY environment variable before starting}
      - FLASK_DEBUG=0
      - PORT=5000
      - DB_PATH=/data/jobs.db
